apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: k8s-cicd-staging

namePrefix: staging-

resources:
  - ../../base

patches:
  - path: deployment-patch.yaml
  - path: hpa-patch.yaml

configMapGenerator:
  - name: k8s-cicd-api-config
    behavior: merge
    literals:
      - LOG_LEVEL=info
      - LOG_FORMAT=json

images:
  - name: k8s-cicd-api
    newName: k8s-cicd-api
    newTag: latest
