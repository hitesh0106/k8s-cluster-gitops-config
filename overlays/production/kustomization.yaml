apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: k8s-cicd-production

namePrefix: prod-

resources:
  - ../../base
  - pdb.yaml

patches:
  - path: deployment-patch.yaml
  - path: hpa-patch.yaml
  - path: ingress-patch.yaml

configMapGenerator:
  - name: k8s-cicd-api-config
    behavior: merge
    literals:
      - LOG_LEVEL=warn
      - LOG_FORMAT=json
      - RATE_LIMIT_MAX=50

images:
  - name: k8s-cicd-api
    newName: k8s-cicd-api
    newTag: latest
