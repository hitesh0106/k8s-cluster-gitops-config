# ============================================================================
# Cert-Manager ClusterIssuers
# Let's Encrypt staging (testing) and production issuers
# ============================================================================

# ─── Staging Issuer (for testing — doesn't hit rate limits) ────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: hitesh@example.com  # Update with your email
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          route53:
            region: ap-south-1
            # IRSA handles authentication — no explicit credentials needed

---

# ─── Production Issuer ─────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: hitesh@example.com  # Update with your email
    privateKeySecretRef:
      name: letsencrypt-production-key
    solvers:
      - dns01:
          route53:
            region: ap-south-1
