# ============================================================================
# Prometheus — Helm Values (kube-prometheus-stack)
# Full monitoring stack: Prometheus + AlertManager + Node Exporter
# ============================================================================

fullnameOverride: prometheus

# ─── Prometheus Server ─────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    replicas: 1
    retention: 15d
    retentionSize: "10GB"

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # Storage for metrics
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    # Scrape configuration
    scrapeInterval: 30s
    evaluationInterval: 30s

    # Additional scrape configs for application metrics
    additionalScrapeConfigs:
      - job_name: 'k8s-cicd-api'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            regex: (.+);(.+)
            replacement: $2:$1

  # Service Monitor for auto-discovery
  serviceMonitor:
    enabled: true

# ─── AlertManager ──────────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  # Alert routing configuration
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          repeat_interval: 1h
    receivers:
      - name: 'default'
        # Configure webhook, email, slack, etc.
        # slack_configs:
        #   - channel: '#alerts'
        #     send_resolved: true
      - name: 'critical'
        # Configure critical alert channel

# ─── Node Exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ─── Kube State Metrics ───────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ─── Grafana (managed separately) ─────────────────────────────────────────────
grafana:
  enabled: false  # We manage Grafana separately for custom dashboards
