# ============================================================================
# Sealed Secret Example
# This is a PLACEHOLDER — you must generate real sealed secrets using:
#   kubeseal --format=yaml < secret.yaml > sealed-secret.yaml
#
# The plain secret (DO NOT commit this to Git!) would look like:
#   apiVersion: v1
#   kind: Secret
#   metadata:
#     name: k8s-cicd-api-secret
#   type: Opaque
#   stringData:
#     DATABASE_URL: "postgresql://user:pass@host:5432/db"
#     JWT_SECRET: "your-jwt-secret"
# ============================================================================

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: k8s-cicd-api-secret
  labels:
    app.kubernetes.io/name: k8s-cicd-api
spec:
  encryptedData:
    # These are placeholder values — replace with actual sealed values
    DATABASE_URL: AgBy3i4OJSWK+PiTySYZZA9rO... # kubeseal encrypted
    JWT_SECRET: AgBy3i4OJSWK+PiTySYZZA9rO...   # kubeseal encrypted
  template:
    type: Opaque
    metadata:
      name: k8s-cicd-api-secret
      labels:
        app.kubernetes.io/name: k8s-cicd-api
