apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-cicd-api-config
  namespace: k8s-cicd-app
  labels:
    app.kubernetes.io/name: k8s-cicd-api
data:
  APP_NAME: "k8s-cicd-api"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX: "100"
  CORS_ORIGIN: "*"
  HEALTH_CHECK_DEPS: "false"
