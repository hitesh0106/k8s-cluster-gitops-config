# ============================================================================
# CI Pipeline — GitHub Actions
# Triggers on push to main/develop, runs lint → test → scan → build → push
# ============================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'

env:
  NODE_VERSION: '20'
  APP_DIR: 'app'
  ECR_REPOSITORY: k8s-cicd-api
  IMAGE_TAG: v1.0.0-${{ github.sha }}

permissions:
  id-token: write   # Required for OIDC
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & Test
  # ─────────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ env.APP_DIR }}
        run: npm run lint

      - name: Run unit tests with coverage
        working-directory: ${{ env.APP_DIR }}
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.APP_DIR }}/coverage/
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Security Scan (SonarCloud + Trivy)
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarCloud

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ env.APP_DIR }}

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ env.APP_DIR }}
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build & Push Docker Image
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=raw,value=v1.0.0-${{ steps.vars.outputs.short_sha }}
            type=raw,value=latest
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:v1.0.0-${{ steps.vars.outputs.short_sha }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail pipeline on critical vulnerabilities

      - name: Upload Trivy image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Update K8s Manifests (Trigger GitOps)
  # ─────────────────────────────────────────────────────────────────────────────
  update-manifests:
    name: 📦 Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout K8s manifests repo
        uses: actions/checkout@v4
        with:
          repository: hitesh0106/k8s-cluster-gitops-config
          token: ${{ secrets.MANIFESTS_REPO_PAT }}
          path: k8s-manifests

      - name: Update image tag in kustomization
        working-directory: k8s-manifests
        run: |
          SHORT_SHA=${{ needs.build-and-push.outputs.short_sha }}
          NEW_IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:v1.0.0-${SHORT_SHA}"

          echo "Updating image to: ${NEW_IMAGE}"

          # Update dev overlay
          cd overlays/dev
          kustomize edit set image k8s-cicd-api=${NEW_IMAGE}

          # Update staging overlay
          cd ../staging
          kustomize edit set image k8s-cicd-api=${NEW_IMAGE}

      - name: Commit and push manifest changes
        working-directory: k8s-manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --staged --quiet || {
            git commit -m "ci: update image tag to v1.0.0-${{ needs.build-and-push.outputs.short_sha }}"
            git push
          }
          echo "✅ Manifests updated — ArgoCD will auto-sync!"
