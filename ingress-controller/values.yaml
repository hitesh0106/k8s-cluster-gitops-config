# ============================================================================
# AWS Load Balancer Controller — Helm Values
# Manages ALB/NLB Ingress resources in EKS
# ============================================================================

clusterName: k8s-cicd-cluster
region: ap-south-1

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/k8s-cicd-aws-lb-controller-role"

replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Enable WAF integration
enableWaf: true
enableWafv2: true
enableShield: true

# Pod anti-affinity for HA
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - aws-load-balancer-controller
          topologyKey: kubernetes.io/hostname

# Default ingress class
ingressClass: alb
createIngressClassResource: true
